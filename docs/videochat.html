<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>VPN Room</title>

<style>
* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
}

body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;

  display: flex;
  flex-direction: column;
}

header {
  padding: 14px 16px;
  background: #111827;

  display: flex;
  justify-content: space-between;
  align-items: center;

  gap: 16px;
  flex-wrap: wrap;
}

.header-left {
  min-width: 0;
}

.title {
  font-size: 19px;
  font-weight: 700;
}

#status {
  margin-top: 4px;
  color: #94a3b8;
  font-size: 13px;
}

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

/* ========================================
   MODE CHECKBOXES
======================================== */

.mode-options {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;

  padding: 8px 10px;

  background: #1e293b;
  border-radius: 12px;
}

.mode-option {
  display: inline-flex;
  align-items: center;
  gap: 6px;

  font-size: 14px;
  cursor: pointer;
  user-select: none;
}

.mode-option input {
  width: 17px;
  height: 17px;
  margin: 0;
}

/* ========================================
   BUTTONS
======================================== */

button {
  padding: 11px 16px;

  border: 0;
  border-radius: 13px;

  background: #2563eb;
  color: white;

  cursor: pointer;

  font-size: 14px;
  font-weight: 700;

  transition:
    transform 0.12s ease,
    filter 0.12s ease,
    box-shadow 0.12s ease,
    background 0.12s ease;

  box-shadow:
    0 4px 14px rgba(0,0,0,0.25);
}

button:hover {
  transform:
    translateY(-2px)
    scale(1.03);

  filter: brightness(1.12);

  box-shadow:
    0 10px 24px rgba(37,99,235,0.35);
}

button:active {
  transform:
    translateY(2px)
    scale(0.96);

  filter: brightness(0.9);
}

button.danger {
  background: #dc2626;
}

button:disabled {
  opacity: 0.5;
  cursor: default;
  transform: none;
}

/* ========================================
   MAIN LAYOUT
======================================== */

main {
  flex: 1;
  min-height: 0;

  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
}

.video-area {
  min-width: 0;
  min-height: 0;

  padding: 12px;
  overflow-y: auto;
}

/* ========================================
   VIDEO GRID
======================================== */

.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
}

.video-box {
  background: #1e293b;
  border-radius: 12px;
  overflow: hidden;

  min-height: 220px;
  position: relative;

  transition:
    box-shadow 0.12s ease,
    transform 0.12s ease;
}

.video-box video {
  width: 100%;
  height: 100%;
  min-height: 220px;
  display: block;
  object-fit: cover;
}

.video-box.speaking {
  box-shadow:
    0 0 0 3px #22c55e,
    0 0 24px rgba(34,197,94,0.7);
}

.audio-meter {
  position: absolute;

  left: 10px;
  right: 10px;
  bottom: 38px;

  height: 7px;

  background: rgba(255,255,255,0.18);
  border-radius: 999px;
  overflow: hidden;
}

.audio-meter-fill {
  width: 0%;
  height: 100%;

  background: #22c55e;
  border-radius: 999px;

  transition: width 0.08s linear;
}

.label {
  position: absolute;
  left: 10px;
  bottom: 10px;

  background: rgba(0,0,0,0.55);

  padding: 4px 8px;
  border-radius: 8px;

  font-size: 13px;
}

.video-placeholder {
  min-height: 220px;

  display: flex;
  align-items: center;
  justify-content: center;

  color: #64748b;
  text-align: center;

  padding: 24px;
}

/* ========================================
   CHAT
======================================== */

.chat-panel {
  min-width: 0;
  min-height: 0;

  display: flex;
  flex-direction: column;

  background: #111827;
  border-left: 1px solid #263244;
}

.chat-panel.hidden {
  display: none;
}

.chat-header {
  padding: 12px;

  border-bottom: 1px solid #263244;
}

.chat-title {
  font-weight: 700;
}

.participants {
  margin-top: 8px;

  display: flex;
  gap: 6px;

  overflow-x: auto;
}

.participant {
  flex: 0 0 auto;

  padding: 5px 8px;

  background: #1e293b;
  border-radius: 999px;

  font-size: 12px;
}

.participant.own {
  background: #1d4ed8;
}

#messages {
  flex: 1;
  min-height: 0;

  overflow-y: auto;

  padding: 12px;

  display: flex;
  flex-direction: column;
  gap: 10px;
}

.empty-message {
  margin: auto;
  color: #64748b;
  text-align: center;
}

.message {
  max-width: 88%;

  align-self: flex-start;

  padding: 9px 11px;

  background: #1e293b;
  border-radius: 12px;
}

.message.own {
  align-self: flex-end;
  background: #2563eb;
}

.message-head {
  margin-bottom: 4px;

  display: flex;
  gap: 8px;

  font-size: 11px;
}

.message-name {
  font-weight: 700;
}

.message-time {
  color: #cbd5e1;
}

.message-text {
  white-space: pre-wrap;
  overflow-wrap: anywhere;

  font-size: 14px;
  line-height: 1.4;
}

.composer {
  padding: 10px;

  border-top: 1px solid #263244;

  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
}

#messageInput {
  min-width: 0;
  min-height: 42px;
  max-height: 120px;

  resize: vertical;

  padding: 10px 12px;

  background: #0f172a;
  color: white;

  border: 1px solid #334155;
  border-radius: 10px;

  font: inherit;
  outline: none;
}

#messageInput:focus {
  border-color: #2563eb;
}

#messageInput:disabled {
  opacity: 0.5;
}

/* ========================================
   SERVICE CONSOLE
======================================== */

#service-console,
#build-down {
  padding: 5px 10px;

  background: #020617;
  color: #94a3b8;

  font-size: 12px;
}

@media (max-width: 900px) {
  main {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(320px, 1fr) 420px;
  }

  .chat-panel {
    border-left: 0;
    border-top: 1px solid #263244;
  }
}

@media (max-width: 650px) {
  header {
    align-items: stretch;
  }

  .controls {
    width: 100%;
  }

  .mode-options {
    width: 100%;
  }

  .video-grid {
    grid-template-columns: 1fr;
  }

  .composer {
    grid-template-columns: 1fr;
  }

  #sendBtn {
    width: 100%;
  }
}
</style>

</head>

<body>

<header>

  <div class="header-left">
    <div class="title">VPN Room</div>
    <div id="status">not connected</div>
  </div>

  <div class="controls">

    <div class="mode-options">

      <label class="mode-option">
        <input
          id="videoCheck"
          type="checkbox"
          checked
        />
        Video
      </label>

      <label class="mode-option">
        <input
          id="audioCheck"
          type="checkbox"
          checked
        />
        Audio
      </label>

      <label class="mode-option">
        <input
          id="messagesCheck"
          type="checkbox"
          checked
        />
        Messages
      </label>

    </div>

    <button id="joinBtn">Join</button>

    <button
      id="leaveBtn"
      class="danger"
      disabled>
      Leave
    </button>

  </div>

</header>

<main id="mainLayout">

  <section class="video-area">

    <div id="videoGrid"
         class="video-grid">

      <div id="videoPlaceholder"
           class="video-placeholder">
        Join the room
      </div>

    </div>

  </section>

  <aside id="chatPanel"
         class="chat-panel">

    <div class="chat-header">

      <div class="chat-title">
        Chat
      </div>

      <div id="participants"
           class="participants">
      </div>

    </div>

    <div id="messages">

      <div id="emptyMessage"
           class="empty-message">
        Join the room to start chatting
      </div>

    </div>

    <div class="composer">

      <textarea
        id="messageInput"
        placeholder="Write a message..."
        disabled>
      </textarea>

      <button
        id="sendBtn"
        disabled>
        Send
      </button>

    </div>

  </aside>

</main>

<script type="module">

import {
  Room,
  RoomEvent
} from "https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.esm.mjs";

/*
========================================
НАСТРОЙКИ
========================================
*/

const LIVEKIT_URL =
  "wss://mvp-81onftka.livekit.cloud";

const SUPABASE_FUNCTION_URL =
  "https://fnodbpiwkkrdgqvmyanq.supabase.co/functions/v1/livekit-token";

const SUPABASE_ANON_KEY =
  "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZub2RicGl3a2tyZGdxdm15YW5xIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0NDk5MDAsImV4cCI6MjA4OTAyNTkwMH0.Gi4l3LAU3S4T77_2xgVWKmkeW34xblrJf04IlE4zu9I";

const params =
  new URLSearchParams(
    window.location.search
  );

const roomName =
  params.get("room") || "test-room";

const identity =
  (params.get("name") || "").trim()
  || "user-" + Math.floor(
    Math.random() * 100000
  );

const CHAT_TOPIC =
  "room-chat";

let room =
  null;

let audioMeterTimer =
  null;

let isConnected =
  false;

const participantBoxes =
  new Map();

/*
========================================
DOM
========================================
*/

const statusBox =
  document.getElementById("status");

const videoGrid =
  document.getElementById("videoGrid");

const videoPlaceholder =
  document.getElementById(
    "videoPlaceholder"
  );

const chatPanel =
  document.getElementById("chatPanel");

const participantsBox =
  document.getElementById(
    "participants"
  );

const messagesBox =
  document.getElementById("messages");

const messageInput =
  document.getElementById(
    "messageInput"
  );

const sendBtn =
  document.getElementById("sendBtn");

const joinBtn =
  document.getElementById("joinBtn");

const leaveBtn =
  document.getElementById("leaveBtn");

const videoCheck =
  document.getElementById("videoCheck");

const audioCheck =
  document.getElementById("audioCheck");

const messagesCheck =
  document.getElementById(
    "messagesCheck"
  );

/*
========================================
TOKEN
========================================
*/

async function getLiveKitToken() {

  const response =
    await fetch(
      SUPABASE_FUNCTION_URL,
      {
        method: "POST",

        headers: {
          "Content-Type":
            "application/json",

          "apikey":
            SUPABASE_ANON_KEY,

          "Authorization":
            "Bearer "
            + SUPABASE_ANON_KEY
        },

        body: JSON.stringify({
          room: roomName,
          identity: identity
        })
      }
    );

  const data =
    await response.json();

  if (!response.ok) {

    console.error(
      "TOKEN FUNCTION ERROR:",
      data
    );

    throw new Error(
      data.error ||
      data.message ||
      JSON.stringify(data)
    );
  }

  return data.token;
}

/*
========================================
ВИДЕО-КАРТОЧКИ
========================================
*/

function removePlaceholder() {

  const placeholder =
    document.getElementById(
      "videoPlaceholder"
    );

  if (placeholder) {
    placeholder.remove();
  }
}

function showPlaceholder(text) {

  if (
    participantBoxes.size > 0 ||
    document.getElementById(
      "videoPlaceholder"
    )
  ) {
    return;
  }

  const placeholder =
    document.createElement("div");

  placeholder.id =
    "videoPlaceholder";

  placeholder.className =
    "video-placeholder";

  placeholder.textContent =
    text;

  videoGrid.appendChild(
    placeholder
  );
}

function addTrack(
  track,
  participantName
) {

  if (track.kind !== "video")
    return;

  if (
    participantBoxes.has(
      participantName
    )
  ) {
    return;
  }

  removePlaceholder();

  const box =
    document.createElement("div");

  box.className =
    "video-box";

  const element =
    track.attach();

  const label =
    document.createElement("div");

  label.className =
    "label";

  label.textContent =
    participantName === identity
      ? participantName + " (you)"
      : participantName;

  const meter =
    document.createElement("div");

  meter.className =
    "audio-meter";

  const meterFill =
    document.createElement("div");

  meterFill.className =
    "audio-meter-fill";

  meter.appendChild(
    meterFill
  );

  box.appendChild(
    element
  );

  box.appendChild(
    meter
  );

  box.appendChild(
    label
  );

  videoGrid.appendChild(
    box
  );

  participantBoxes.set(
    participantName,
    {
      box: box,
      meterFill: meterFill,
      track: track
    }
  );
}

function removeParticipantVideo(
  participantName
) {

  const data =
    participantBoxes.get(
      participantName
    );

  if (!data)
    return;

  try {
    data.track.detach();
  } catch (error) {
    console.warn(error);
  }

  data.box.remove();

  participantBoxes.delete(
    participantName
  );

  if (
    participantBoxes.size === 0
  ) {
    showPlaceholder(
      isConnected
        ? "No active video"
        : "Join the room"
    );
  }
}

/*
========================================
ИНДИКАТОРЫ ЗВУКА
========================================
*/

function updateAudioIndicators() {

  if (!room)
    return;

  participantBoxes.forEach(
    (data, participantName) => {

      let participant =
        null;

      if (
        participantName === identity
      ) {
        participant =
          room.localParticipant;
      } else {
        participant =
          room.remoteParticipants.get(
            participantName
          );
      }

      if (!participant) {

        data.box.classList.remove(
          "speaking"
        );

        data.meterFill.style.width =
          "0%";

        return;
      }

      const level =
        Math.round(
          (participant.audioLevel || 0)
          * 100
        );

      const isSpeaking =
        participant.isSpeaking === true;

      data.box.classList.toggle(
        "speaking",
        isSpeaking
      );

      data.meterFill.style.width =
        isSpeaking
          ? level + "%"
          : "0%";
    }
  );
}

function startAudioMeterTimer() {

  stopAudioMeterTimer();

  audioMeterTimer =
    setInterval(
      updateAudioIndicators,
      120
    );
}

function stopAudioMeterTimer() {

  if (audioMeterTimer) {

    clearInterval(
      audioMeterTimer
    );

    audioMeterTimer =
      null;
  }
}

/*
========================================
УЧАСТНИКИ
========================================
*/

function updateParticipants() {

  participantsBox.innerHTML =
    "";

  if (!room)
    return;

  addParticipantItem(
    room.localParticipant.identity,
    true
  );

  room.remoteParticipants.forEach(
    participant => {

      addParticipantItem(
        participant.identity,
        false
      );
    }
  );
}

function addParticipantItem(
  participantName,
  own
) {

  const item =
    document.createElement("div");

  item.className =
    own
      ? "participant own"
      : "participant";

  item.textContent =
    own
      ? participantName + " (you)"
      : participantName;

  participantsBox.appendChild(
    item
  );
}

/*
========================================
CHAT
========================================
*/

function addMessage(
  message,
  own
) {

  const empty =
    document.getElementById(
      "emptyMessage"
    );

  if (empty) {
    empty.remove();
  }

  const box =
    document.createElement("div");

  box.className =
    own
      ? "message own"
      : "message";

  const head =
    document.createElement("div");

  head.className =
    "message-head";

  const name =
    document.createElement("span");

  name.className =
    "message-name";

  name.textContent =
    own
      ? message.sender + " (you)"
      : message.sender;

  const time =
    document.createElement("span");

  time.className =
    "message-time";

  time.textContent =
    new Date(
      message.timestamp
    ).toLocaleTimeString(
      [],
      {
        hour: "2-digit",
        minute: "2-digit"
      }
    );

  const text =
    document.createElement("div");

  text.className =
    "message-text";

  text.textContent =
    message.text;

  head.appendChild(
    name
  );

  head.appendChild(
    time
  );

  box.appendChild(
    head
  );

  box.appendChild(
    text
  );

  messagesBox.appendChild(
    box
  );

  messagesBox.scrollTop =
    messagesBox.scrollHeight;
}

async function sendMessage() {

  if (
    !room ||
    !messagesCheck.checked
  ) {
    return;
  }

  const text =
    messageInput.value.trim();

  if (!text)
    return;

  const message = {
    type: "chat-message",
    sender: identity,
    text: text,
    timestamp: Date.now()
  };

  const bytes =
    new TextEncoder().encode(
      JSON.stringify(message)
    );

  await room.localParticipant
    .publishData(
      bytes,
      {
        reliable: true,
        topic: CHAT_TOPIC
      }
    );

  addMessage(
    message,
    true
  );

  messageInput.value =
    "";

  messageInput.focus();
}

function handleDataReceived(
  payload,
  participant,
  kind,
  topic
) {

  if (
    topic &&
    topic !== CHAT_TOPIC
  ) {
    return;
  }

  try {

    const json =
      new TextDecoder().decode(
        payload
      );

    const data =
      JSON.parse(json);

    if (
      data.type !==
      "chat-message"
    ) {
      return;
    }

    addMessage(
      {
        sender:
          data.sender ||
          participant?.identity ||
          "unknown",

        text:
          String(
            data.text || ""
          ),

        timestamp:
          Number(
            data.timestamp
          ) || Date.now()
      },
      false
    );

  } catch (error) {

    console.warn(
      "Invalid chat message:",
      error
    );
  }
}

/*
========================================
ПЕРЕКЛЮЧЕНИЕ VIDEO
========================================
*/

async function applyVideoState() {

  if (!room)
    return;

  try {

    await room.localParticipant
      .setCameraEnabled(
        videoCheck.checked
      );

    if (
      videoCheck.checked
    ) {

      room.localParticipant
        .videoTrackPublications
        .forEach(publication => {

          if (
            publication.track
          ) {
            addTrack(
              publication.track,
              identity
            );
          }
        });

    } else {

      removeParticipantVideo(
        identity
      );
    }

  } catch (error) {

    console.error(error);

    statusBox.textContent =
      "video error: "
      + error.message;

    videoCheck.checked =
      !videoCheck.checked;
  }
}

/*
========================================
ПЕРЕКЛЮЧЕНИЕ AUDIO
========================================
*/

async function applyAudioState() {

  if (!room)
    return;

  try {

    await room.localParticipant
      .setMicrophoneEnabled(
        audioCheck.checked
      );

  } catch (error) {

    console.error(error);

    statusBox.textContent =
      "audio error: "
      + error.message;

    audioCheck.checked =
      !audioCheck.checked;
  }
}

/*
========================================
ПЕРЕКЛЮЧЕНИЕ MESSAGES
========================================
*/

function applyMessagesState() {

  const enabled =
    messagesCheck.checked;

  chatPanel.classList.toggle(
    "hidden",
    !enabled
  );

  messageInput.disabled =
    !enabled ||
    !isConnected;

  sendBtn.disabled =
    !enabled ||
    !isConnected;
}

/*
========================================
ПОДКЛЮЧЕНИЕ
========================================
*/

async function joinRoom() {

  if (room)
    return;

  try {

    joinBtn.disabled =
      true;

    statusBox.textContent =
      "getting token...";

    const token =
      await getLiveKitToken();

    room =
      new Room();

    room.on(
      RoomEvent.TrackSubscribed,
      (
        track,
        publication,
        participant
      ) => {

        if (
          track.kind === "video"
        ) {
          addTrack(
            track,
            participant.identity
          );
        }

        /*
        Для удалённого аудио обязательно
        прикрепляем track к audio-элементу.
        */

        if (
          track.kind === "audio"
        ) {

          const audioElement =
            track.attach();

          audioElement.style.display =
            "none";

          document.body.appendChild(
            audioElement
          );
        }
      }
    );

    room.on(
      RoomEvent.TrackUnsubscribed,
      (
        track,
        publication,
        participant
      ) => {

        if (
          track.kind === "video"
        ) {

          removeParticipantVideo(
            participant.identity
          );
        }

        try {
          track.detach().forEach(
            element => element.remove()
          );
        } catch (error) {
          console.warn(error);
        }
      }
    );

    room.on(
      RoomEvent.ActiveSpeakersChanged,
      updateAudioIndicators
    );

    room.on(
      RoomEvent.DataReceived,
      handleDataReceived
    );

    room.on(
      RoomEvent.ParticipantConnected,
      updateParticipants
    );

    room.on(
      RoomEvent.ParticipantDisconnected,
      participant => {

        removeParticipantVideo(
          participant.identity
        );

        updateParticipants();
      }
    );

    room.on(
      RoomEvent.Disconnected,
      resetDisconnectedState
    );

    statusBox.textContent =
      "connecting...";

    await room.connect(
      LIVEKIT_URL,
      token
    );

    isConnected =
      true;

    if (
      videoCheck.checked
    ) {

      try {

        await room.localParticipant
          .setCameraEnabled(true);

      } catch (error) {

        console.warn(
          "Camera error:",
          error
        );

        videoCheck.checked =
          false;
      }
    }

    if (
      audioCheck.checked
    ) {

      try {

        await room.localParticipant
          .setMicrophoneEnabled(
            true
          );

      } catch (error) {

        console.warn(
          "Microphone error:",
          error
        );

        audioCheck.checked =
          false;
      }
    }

    room.localParticipant
      .videoTrackPublications
      .forEach(publication => {

        if (
          publication.track
        ) {

          addTrack(
            publication.track,
            identity
          );
        }
      });

    updateParticipants();

    startAudioMeterTimer();

    applyMessagesState();

    statusBox.textContent =
      "connected: "
      + roomName
      + " | "
      + identity;

    leaveBtn.disabled =
      false;

  } catch (error) {

    console.error(error);

    statusBox.textContent =
      "error: "
      + error.message;

    if (room) {
      room.disconnect();
      room = null;
    }

    isConnected =
      false;

    joinBtn.disabled =
      false;

    leaveBtn.disabled =
      true;

    applyMessagesState();
  }
}

/*
========================================
ВЫХОД
========================================
*/

function leaveRoom() {

  if (room) {
    room.disconnect();
  }

  resetDisconnectedState();
}

function resetDisconnectedState() {

  stopAudioMeterTimer();

  isConnected =
    false;

  if (room) {

    room.localParticipant
      .trackPublications
      .forEach(publication => {

        if (
          publication.track
        ) {

          try {
            publication.track
              .stop();
          } catch (error) {
            console.warn(error);
          }
        }
      });
  }

  room =
    null;

  participantBoxes.forEach(
    data => {

      try {
        data.track.detach();
      } catch (error) {
        console.warn(error);
      }

      data.box.remove();
    }
  );

  participantBoxes.clear();

  participantsBox.innerHTML =
    "";

  showPlaceholder(
    "Join the room"
  );

  joinBtn.disabled =
    false;

  leaveBtn.disabled =
    true;

  statusBox.textContent =
    "disconnected";

  applyMessagesState();
}

/*
========================================
СОБЫТИЯ
========================================
*/

joinBtn.addEventListener(
  "click",
  joinRoom
);

leaveBtn.addEventListener(
  "click",
  leaveRoom
);

videoCheck.addEventListener(
  "change",
  applyVideoState
);

audioCheck.addEventListener(
  "change",
  applyAudioState
);

messagesCheck.addEventListener(
  "change",
  applyMessagesState
);

sendBtn.addEventListener(
  "click",
  sendMessage
);

messageInput.addEventListener(
  "keydown",
  event => {

    if (
      event.key === "Enter" &&
      !event.shiftKey
    ) {

      event.preventDefault();

      sendMessage();
    }
  }
);

/*
Начальное состояние панели сообщений.
*/

applyMessagesState();

</script>

<div id="service-console">
  GPT | v1.0.0
</div>

<div class="row" id="build-down">
  deploy: --
</div>

<script>
(function () {

  const now =
    new Date();

  const pad = number =>
    String(number).padStart(
      2,
      "0"
    );

  const date =
      pad(now.getDate())
    + "."
    + pad(
        now.getMonth() + 1
      )
    + "."
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ":"
    + pad(now.getMinutes());

  document
    .getElementById(
      "build-down"
    )
    .textContent =
      "deploy: "
      + date
      + " "
      + time;
})();
</script>

</body>
</html>
