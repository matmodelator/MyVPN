<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>VPN Chat</title>

<style>

/*
========================================
БАЗОВАЯ НАСТРОЙКА РАЗМЕРОВ
========================================

box-sizing: border-box заставляет браузер
включать padding и border в указанную ширину
и высоту элемента. Это упрощает расчёт размеров
всей страницы.
*/

* {
  box-sizing: border-box;
}

/*
Страница занимает всю высоту окна браузера.
Это необходимо, чтобы основной блок мог
растягиваться на всё доступное пространство.
*/

html,
body {
  height: 100%;
}

/*
body является главным вертикальным контейнером:

1. header находится сверху;
2. main занимает всё оставшееся место;
3. сервисная консоль располагается снизу.
*/

body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: Arial, sans-serif;

  display: flex;
  flex-direction: column;
}

/*
========================================
ВЕРХНЯЯ ПАНЕЛЬ
========================================

В header находятся:

- название комнаты;
- текущий статус подключения;
- галочки Video / Audio / Messages;
- кнопки Join и Leave.

flex-wrap позволяет элементам переноситься
на следующую строку на узких экранах.
*/

header {
  padding: 14px 16px;
  background: #111827;

  display: flex;
  justify-content: space-between;
  align-items: center;

  gap: 16px;
  flex-wrap: wrap;
}

/*
Левая часть header с названием и статусом.
min-width: 0 позволяет тексту корректно
сжиматься внутри flex-контейнера.
*/

.header-left {
  min-width: 0;
}

.title {
  font-size: 19px;
  font-weight: 700;
}

#status {
  margin-top: 4px;
  color: #94a3b8;
  font-size: 13px;
}

/*
Правая часть header со всеми элементами управления.
*/

.controls {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

/* ========================================
   УПРАВЛЕНИЕ КОМНАТОЙ
========================================

Поле Room позволяет:

- ввести имя существующей комнаты;
- изменить имя до подключения;
- получить случайное имя кнопкой Create room.

После успешного подключения поле блокируется,
потому что активную LiveKit-комнату нельзя
переименовать без переподключения.
*/

.room-controls {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-wrap: wrap;
}

.room-input {
  width: 180px;
  min-width: 120px;
  padding: 10px 12px;
  border: 1px solid #334155;
  border-radius: 12px;
  background: #0f172a;
  color: white;
  font: inherit;
  outline: none;
}

.room-input:focus { border-color: #2563eb; }
.room-input:disabled { opacity: 0.55; }
.create-room-btn { background: #0f766e; }

.invite-link {
  width: 100%;
  display: none;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  background: #0b1220;
}

.invite-link.visible { display: flex; }

.invite-link input {
  flex: 1;
  min-width: 0;
  padding: 9px 11px;
  border: 1px solid #334155;
  border-radius: 10px;
  background: #020617;
  color: #cbd5e1;
}

.copy-link-btn {
  padding: 9px 12px;
  background: #475569;
}

/* ========================================
   ПЕРЕКЛЮЧАТЕЛЬ ЯЗЫКА
========================================

Две кнопки RU / EN меняют только надписи
интерфейса. Работа LiveKit от языка не зависит.
*/

.language-switch {
  display: flex;
  overflow: hidden;

  background: #1e293b;
  border-radius: 12px;
}

.language-btn {
  padding: 9px 12px;

  border: 0;
  border-radius: 0;

  background: transparent;
  color: #cbd5e1;

  box-shadow: none;
}

.language-btn:hover {
  transform: none;
  box-shadow: none;
}

.language-btn.active {
  background: #2563eb;
  color: white;
}

/* ========================================
   ГАЛОЧКИ РЕЖИМОВ
========================================

Video:
включает или выключает локальную камеру.

Audio:
включает или выключает локальный микрофон.

Messages:
показывает или скрывает панель чата.

Все три галочки доступны как до подключения,
так и во время уже активного соединения.
*/

.mode-options {
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;

  padding: 8px 10px;

  background: #1e293b;
  border-radius: 12px;
}

.mode-option {
  display: inline-flex;
  align-items: center;
  gap: 6px;

  font-size: 14px;
  cursor: pointer;
  user-select: none;
}

.mode-option input {
  width: 17px;
  height: 17px;
  margin: 0;
}

/* ========================================
   КНОПКИ
========================================

Общий стиль используется для Join, Leave и Send.
Кнопка Leave дополнительно получает класс danger.
*/

button {
  padding: 11px 16px;

  border: 0;
  border-radius: 13px;

  background: #2563eb;
  color: white;

  cursor: pointer;

  font-size: 14px;
  font-weight: 700;

  transition:
    transform 0.12s ease,
    filter 0.12s ease,
    box-shadow 0.12s ease,
    background 0.12s ease;

  box-shadow:
    0 4px 14px rgba(0,0,0,0.25);
}

button:hover {
  transform:
    translateY(-2px)
    scale(1.03);

  filter: brightness(1.12);

  box-shadow:
    0 10px 24px rgba(37,99,235,0.35);
}

button:active {
  transform:
    translateY(2px)
    scale(0.96);

  filter: brightness(0.9);
}

button.danger {
  background: #dc2626;
}

button:disabled {
  opacity: 0.5;
  cursor: default;
  transform: none;
}

/* ========================================
   ОСНОВНОЙ МАКЕТ
========================================

main разделён на две колонки:

1. левая часть — видео;
2. правая часть — чат шириной 360 px.

minmax(0, 1fr) позволяет видеоколонке
занимать всё оставшееся место и корректно сжиматься.
*/

main {
  flex: 1;
  min-height: 0;

  display: grid;
  grid-template-columns: minmax(0, 1fr) 360px;
}

.video-area {
  min-width: 0;
  min-height: 0;

  padding: 12px;
  overflow-y: auto;
}

/* ========================================
   СЕТКА ВИДЕО
========================================

Карточки автоматически располагаются в несколько
колонок. Минимальная ширина одной карточки — 280 px.
*/

.video-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 12px;
}

/*
Одна карточка участника.

Внутри неё находятся:

- элемент <video>;
- индикатор уровня звука;
- имя участника.
*/

.video-box {
  background: #1e293b;
  border-radius: 12px;
  overflow: hidden;

  min-height: 220px;
  position: relative;

  transition:
    box-shadow 0.12s ease,
    transform 0.12s ease;
}

.video-box video {
  width: 100%;
  height: 100%;
  min-height: 220px;
  display: block;
  object-fit: cover;
}

/*
Класс speaking добавляется участнику,
который в данный момент говорит.
*/

.video-box.speaking {
  box-shadow:
    0 0 0 3px #22c55e,
    0 0 24px rgba(34,197,94,0.7);
}

/*
Фоновая полоса индикатора громкости.
*/

.audio-meter {
  position: absolute;

  left: 10px;
  right: 10px;
  bottom: 38px;

  height: 7px;

  background: rgba(255,255,255,0.18);
  border-radius: 999px;
  overflow: hidden;
}

/*
Заполняемая зелёная часть индикатора.
Её ширина меняется JavaScript-кодом.
*/

.audio-meter-fill {
  width: 0%;
  height: 100%;

  background: #22c55e;
  border-radius: 999px;

  transition: width 0.08s linear;
}

/*
Подпись с identity участника.
*/

.label {
  position: absolute;
  left: 10px;
  bottom: 10px;

  background: rgba(0,0,0,0.55);

  padding: 4px 8px;
  border-radius: 8px;

  font-size: 13px;
}

/*
Заглушка, которая выводится, когда:

- пользователь ещё не подключён;
- ни у кого нет активного видеотрека.
*/

.video-placeholder {
  min-height: 220px;

  display: flex;
  align-items: center;
  justify-content: center;

  color: #64748b;
  text-align: center;

  padding: 24px;
}

/* ========================================
   ЧАТ
========================================

Панель содержит:

- заголовок;
- список участников;
- историю сообщений;
- поле ввода;
- кнопку Send.
*/

.chat-panel {
  min-width: 0;
  min-height: 0;

  display: flex;
  flex-direction: column;

  background: #111827;
  border-left: 1px solid #263244;
}

/*
Класс hidden устанавливается,
когда снята галочка Messages.
*/

.chat-panel.hidden {
  display: none;
}

.chat-header {
  padding: 12px;

  border-bottom: 1px solid #263244;
}

.chat-title {
  font-weight: 700;
}

/*
Горизонтальный список участников комнаты.
*/

.participants {
  margin-top: 8px;

  display: flex;
  gap: 6px;

  overflow-x: auto;
}

.participant {
  flex: 0 0 auto;

  padding: 5px 8px;

  background: #1e293b;
  border-radius: 999px;

  font-size: 12px;
}

.participant.own {
  background: #1d4ed8;
}

/*
Прокручиваемая область истории сообщений.
*/

#messages {
  flex: 1;
  min-height: 0;

  overflow-y: auto;

  padding: 12px;

  display: flex;
  flex-direction: column;
  gap: 10px;
}

.empty-message {
  margin: auto;
  color: #64748b;
  text-align: center;
}

/*
Сообщение другого участника располагается слева.
*/

.message {
  max-width: 88%;

  align-self: flex-start;

  padding: 9px 11px;

  background: #1e293b;
  border-radius: 12px;
}

/*
Собственное сообщение располагается справа
и выделяется синим цветом.
*/

.message.own {
  align-self: flex-end;
  background: #2563eb;
}

.message-head {
  margin-bottom: 4px;

  display: flex;
  gap: 8px;

  font-size: 11px;
}

.message-name {
  font-weight: 700;
}

.message-time {
  color: #cbd5e1;
}

.message-text {
  white-space: pre-wrap;
  overflow-wrap: anywhere;

  font-size: 14px;
  line-height: 1.4;
}

/*
Нижняя строка чата:

- textarea занимает оставшуюся ширину;
- кнопка Send располагается справа.
*/

.composer {
  padding: 10px;

  border-top: 1px solid #263244;

  display: grid;
  grid-template-columns: 1fr auto;
  gap: 8px;
}

#messageInput {
  min-width: 0;
  min-height: 42px;
  max-height: 120px;

  resize: vertical;

  padding: 10px 12px;

  background: #0f172a;
  color: white;

  border: 1px solid #334155;
  border-radius: 10px;

  font: inherit;
  outline: none;
}

#messageInput:focus {
  border-color: #2563eb;
}

#messageInput:disabled {
  opacity: 0.5;
}

/* ========================================
   СЕРВИСНАЯ КОНСОЛЬ
========================================

Нижние строки показывают номер версии
и время загрузки страницы.
*/

#service-console,
#build-down {
  padding: 5px 10px;

  background: #020617;
  color: #94a3b8;

  font-size: 12px;
}

@media (max-width: 900px) {
  main {
    grid-template-columns: 1fr;
    grid-template-rows: minmax(320px, 1fr) 420px;
  }

  .chat-panel {
    border-left: 0;
    border-top: 1px solid #263244;
  }
}

@media (max-width: 650px) {
  header {
    align-items: stretch;
  }

  .controls {
    width: 100%;
  }

  .mode-options {
    width: 100%;
  }

  .video-grid {
    grid-template-columns: 1fr;
  }

  .composer {
    grid-template-columns: 1fr;
  }

  #sendBtn {
    width: 100%;
  }
}


/* ========================================
   НОВЫЙ МАКЕТ: КОНСОЛЬ / ВИДЕО / ЧАТ
========================================

Слева находится консоль событий.
По центру — видеополя и запрос на вход.
Справа сохраняется существующий текстовый чат.
*/

body { overflow: hidden; }

header {
  display: grid;
  grid-template-columns: minmax(180px, 1fr) auto minmax(180px, 1fr);
  align-items: center;
  gap: 16px;
}

.header-center {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}

.header-right {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 10px;
  flex-wrap: wrap;
}

main {
  grid-template-columns: 300px minmax(0, 1fr) 360px;
}

.event-console {
  min-width: 0;
  min-height: 0;
  display: flex;
  flex-direction: column;
  background: #0b1220;
  border-right: 1px solid #263244;
}

.event-console-title {
  padding: 12px;
  font-weight: 700;
  border-bottom: 1px solid #263244;
}

#eventList {
  flex: 1;
  min-height: 0;
  overflow-y: auto;
  padding: 8px 12px;
}

.event-item {
  padding: 10px 0;
  border-bottom: 1px solid #263244;
}

.event-top {
  display: flex;
  align-items: flex-start;
  gap: 8px;
}

.event-icon {
  width: 22px;
  flex: 0 0 22px;
  text-align: center;
}

.event-text {
  flex: 1;
  min-width: 0;
  line-height: 1.35;
  overflow-wrap: anywhere;
}

.event-time {
  color: #64748b;
  font-size: 11px;
  white-space: nowrap;
}

.console-actions {
  padding: 10px;
  border-top: 1px solid #263244;
}

.console-actions button { width: 100%; }

.center-column {
  min-width: 0;
  min-height: 0;
  display: grid;
  grid-template-rows: minmax(0, 1fr) auto;
}

.video-area { position: relative; }

#approvalOverlay {
  position: absolute;
  inset: 12px;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 20px;
  background: rgba(2, 6, 23, 0.72);
  backdrop-filter: blur(5px);
  border-radius: 14px;
}

#approvalOverlay.visible { display: flex; }

.approval-card {
  width: min(480px, 100%);
  padding: 26px;
  text-align: center;
  background: #111827;
  border: 1px solid #475569;
  border-radius: 16px;
  box-shadow: 0 28px 70px rgba(0,0,0,0.5);
}

.approval-card h2 { margin: 0 0 10px; }

.approval-avatar {
  width: 68px;
  height: 68px;
  margin: 0 auto 14px;
  display: grid;
  place-items: center;
  border-radius: 50%;
  background: #4f46e5;
  font-size: 30px;
}

#requestGuestName {
  margin-top: 14px;
  font-size: 22px;
  font-weight: 700;
}

#requestGuestId {
  margin-top: 5px;
  color: #94a3b8;
  font-size: 12px;
}

.approval-buttons {
  margin-top: 20px;
  display: flex;
  justify-content: center;
  gap: 10px;
}

button.success { background: #15803d; }
button.secondary { background: #475569; }

.join-panel {
  padding: 12px;
  background: #111827;
  border-top: 1px solid #263244;
}

.join-row {
  max-width: 700px;
  margin: 0 auto;
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto auto;
  gap: 8px;
}

#nameInput {
  min-width: 0;
  padding: 11px 13px;
  background: #0f172a;
  color: white;
  border: 1px solid #334155;
  border-radius: 11px;
  font: inherit;
  outline: none;
}

#nameInput:focus { border-color: #2563eb; }
#nameInput:disabled { opacity: 0.55; }

#joinNote {
  margin-top: 7px;
  color: #94a3b8;
  text-align: center;
  font-size: 12px;
}

@media (max-width: 1100px) {
  main {
    grid-template-columns: 260px minmax(0, 1fr);
    grid-template-rows: minmax(0, 1fr) 360px;
  }
  .chat-panel {
    grid-column: 1 / -1;
    border-left: 0;
    border-top: 1px solid #263244;
  }
}

@media (max-width: 760px) {
  body { overflow: auto; }
  header { grid-template-columns: 1fr; }
  .header-left, .header-center, .header-right {
    justify-content: center;
    text-align: center;
  }
  main {
    grid-template-columns: 1fr;
    grid-template-rows: 260px minmax(420px, auto) 420px;
  }
  .event-console {
    border-right: 0;
    border-bottom: 1px solid #263244;
  }
  .chat-panel { grid-column: auto; }
  .join-row { grid-template-columns: 1fr; }
  .approval-buttons { flex-direction: column; }
}

</style>

</head>

<body>

<header>

  <!--
  Левая часть верхней панели:
  название приложения и статус соединения.
  -->

  <div class="header-left">
    <div class="title" data-i18n="title">VPN Room</div>
    <div id="status">not connected</div>
  </div>

  <!--
  По центру сверху находятся название комнаты
  и кнопка Create room.
  -->

  <div class="header-center">

    <input
      id="roomInput"
      class="room-input"
      type="text"
      maxlength="64"
      data-i18n-placeholder="roomName"
      placeholder="Room name"
    />

    <button
      id="createRoomBtn"
      class="create-room-btn"
      type="button"
      data-i18n="createRoom">
      Create room
    </button>

  </div>

  <!--
  Справа остаются язык и галочки режимов.
  Кнопка подключения перенесена вниз по центру.
  -->

  <div class="header-right">

    <div class="language-switch">
      <button id="ruBtn" class="language-btn active" type="button">RU</button>
      <button id="enBtn" class="language-btn" type="button">EN</button>
    </div>

    <div class="mode-options">

      <label class="mode-option">
        <input id="videoCheck" type="checkbox" checked />
        <span data-i18n="video">Video</span>
      </label>

      <label class="mode-option">
        <input id="audioCheck" type="checkbox" checked />
        <span data-i18n="audio">Audio</span>
      </label>

      <label class="mode-option">
        <input id="messagesCheck" type="checkbox" checked />
        <span data-i18n="messages">Messages</span>
      </label>

    </div>

  </div>

</header>

<!--
После создания комнаты здесь появляется готовая
ссылка, которую можно отправить другому участнику.
-->

<div id="inviteLinkBox"
     class="invite-link">

  <input
    id="inviteLinkInput"
    type="text"
    readonly
  />

  <button
    id="copyLinkBtn"
    class="copy-link-btn"
    type="button"
    data-i18n="copyLink">
    Copy link
  </button>

</div>

<!--
Основная область приложения.
Слева находится видео, справа чат.
-->

<main id="mainLayout">

  <!--
  Левая консоль событий:
  кто вошёл, кто вышел, кто запросил вход,
  кто отправил вложение.
  -->

  <aside class="event-console">

    <div class="event-console-title" data-i18n="eventConsole">
      Event console
    </div>

    <div id="eventList"></div>

    <div class="console-actions">
      <button
        id="clearEventsBtn"
        class="secondary"
        type="button"
        data-i18n="clearConsole">
        Clear console
      </button>
    </div>

  </aside>

  <!--
  Центральная колонка:
  видеополя сверху, имя и подключение снизу.
  -->

  <section class="center-column">

    <div class="video-area">

      <div id="videoGrid" class="video-grid">
        <div id="videoPlaceholder" class="video-placeholder">
          <span data-i18n="joinRoom">Join the room</span>
        </div>
      </div>

      <!--
      Запрос на вход показывается поверх видео
      только у создателя комнаты.
      -->

      <div id="approvalOverlay">
        <div class="approval-card">
          <div class="approval-avatar">👤</div>
          <h2 data-i18n="joinRequest">Join request</h2>
          <div data-i18n="userWantsToJoin">User wants to join this room</div>
          <div id="requestGuestName"></div>
          <div id="requestGuestId"></div>
          <div class="approval-buttons">

async function openAccessChannel() {
  if (accessChannel) {
    await supabase.removeChannel(accessChannel);
    accessChannel = null;
  }

  if (!roomName) return;

  accessChannel = supabase.channel("room-access-" + roomName);

  accessChannel.on(
    "broadcast",
    { event: "join-request" },
    ({ payload }) => {
      if (!isCreator || payload.browserId === browserId) return;
      currentJoinRequest = payload;
      requestGuestName.textContent = payload.name;
      requestGuestId.textContent = payload.browserId.slice(0, 18);
      approvalOverlay.classList.add("visible");
      addEvent("request", payload.name + " " + t("requestedAccess"));
    }
  );

  accessChannel.on(
    "broadcast",
    { event: "join-response" },
    ({ payload }) => {
      if (payload.targetBrowserId !== browserId) return;
      if (payload.requestId !== pendingRequestId) return;

      if (requestTimeout) clearTimeout(requestTimeout);
      requestTimeout = null;
      pendingRequestId = null;

      if (payload.approved) {
        joinNote.textContent = t("connecting");
        joinRoom();
      } else {
        joinBtn.disabled = false;
        joinNote.textContent = t("requestRejected");
      }
    }
  );

  await accessChannel.subscribe();
}

      requestId: request.requestId,

  addEvent(

  restoreCreatorStatus();

  if (isCreator) {
    joinRoom();
    return;

  if (!accessChannel) await openAccessChannel();

  joinBtn.disabled = true;
  pendingRequestId = crypto.randomUUID
    ? crypto.randomUUID()
    : "request-" + Date.now() + "-" + Math.random();

  await accessChannel.send({
    type: "broadcast",
    event: "join-request",
    payload: {
      requestId: pendingRequestId,
      browserId: browserId,
      name: identity,
      timestamp: Date.now()

  });

  joinNote.textContent = t("requestSent");

  if (requestTimeout) clearTimeout(requestTimeout);

  requestTimeout = setTimeout(() => {
    if (!pendingRequestId) return;
    pendingRequestId = null;
    joinBtn.disabled = false;
    joinNote.textContent = t("creatorOffline");
  }, 15000);
}

function normalizeRoomName(value) {
  return String(value || "")
    .trim()
    .replace(/\s+/g, "-")
    .replace(/[^\p{L}\p{N}_-]/gu, "")
    .slice(0, 64);
}

function generateRoomName() {
  /*
  Не используем crypto.randomUUID(), потому что
  он может быть недоступен при локальном открытии
  страницы или в некоторых браузерах.

  Date.now() добавляет текущий момент времени,
  Math.random() — случайную часть.
  */

  const timePart =
    Date.now().toString(36);

  const randomPart =
    Math.random()
      .toString(36)
      .slice(2, 8);

  return (
    "room-"
    + timePart
    + "-"
    + randomPart
  );
}

  url.searchParams.set("room", name);
  url.searchParams.delete("name");

  roomName = normalizeRoomName(name);

    inviteLinkInput.value = "";

  history.replaceState(null, "", url);
  localStorage.setItem("vpnRoomLastRoom", roomName);
  updateConnectionStatus();
  await openAccessChannel();
  restoreCreatorStatus();
}

/*
========================================
ПОЛУЧЕНИЕ LIVEKIT TOKEN
========================================

Браузер отправляет имя комнаты и identity
в Supabase Edge Function.

Edge Function подписывает LiveKit token
секретным ключом на сервере и возвращает
готовый token браузеру.
*/

async function getLiveKitToken() {

  /*
  Отправляем POST-запрос в Supabase.
  */

  const response =
    await fetch(
      SUPABASE_FUNCTION_URL,
      {
        method: "POST",

        headers: {
          "Content-Type":
            "application/json",

          "apikey":
            SUPABASE_ANON_KEY,

          "Authorization":
            "Bearer "
            + SUPABASE_ANON_KEY
        },

        body: JSON.stringify({
          room: roomName,
          identity: identity
        })
      }
    );

  /*
  Читаем JSON-ответ Edge Function.
  */

  const data =
    await response.json();

  /*
  Любой HTTP-ответ вне диапазона 200–299
  считаем ошибкой и прекращаем подключение.
  */

  if (!response.ok) {

    console.error(
      "TOKEN FUNCTION ERROR:",
      data
    );

    throw new Error(
      data.error ||
      data.message ||
      JSON.stringify(data)
    );
  }

  return data.token;
}

    document.createElement("div");

  box.className =
    "video-box";

  /*
  track.attach() создаёт HTML-элемент <video>
  и связывает его с LiveKit-треком.
  */

  const element =
    track.attach();

  const label =
    document.createElement("div");

  label.className =
    "label";

  label.textContent =
    participantName === identity
      ? participantName + " (" + t("you") + ")"
      : participantName;

  const meter =
    document.createElement("div");

  meter.className =
    "audio-meter";

  const meterFill =
    document.createElement("div");

  meterFill.className =
    "audio-meter-fill";

  meter.appendChild(
    meterFill
  );

  box.appendChild(
    element
  );

  box.appendChild(
    meter
  );

  box.appendChild(
    label
  );

  videoGrid.appendChild(
    box
  );

  participantBoxes.set(
    participantName,
    {
      box: box,
      meterFill: meterFill,
      track: track
    }
  );
}

/*
Удаляет видеокарточку участника,
отсоединяет видеотрек от DOM и очищает Map.
*/

function removeParticipantVideo(
  participantName
) {

  const data =
    participantBoxes.get(
      participantName
    );

  if (!data)
    return;

  try {
    data.track.detach();
  } catch (error) {
    console.warn(error);
  }

  data.box.remove();

  participantBoxes.delete(
    participantName
  );

  if (
    participantBoxes.size === 0
  ) {
    showPlaceholder(
      isConnected
        ? t("noVideo")
        : t("joinRoom")
    );
  }
}

/*
========================================
ИНДИКАТОРЫ УРОВНЯ ЗВУКА
========================================

LiveKit предоставляет:

participant.audioLevel — уровень громкости;
participant.isSpeaking — говорит ли участник.
*/

/*
Обходит все существующие видеокарточки
и обновляет зелёную рамку и полосу громкости.
*/

function updateAudioIndicators() {

  if (!room)
    return;

  participantBoxes.forEach(
    (data, participantName) => {

      let participant =
        null;

      if (
        participantName === identity
      ) {
        participant =
          room.localParticipant;
      } else {
        participant =
          room.remoteParticipants.get(
            participantName
          );
      }

      if (!participant) {

        data.box.classList.remove(
          "speaking"
        );

        data.meterFill.style.width =
          "0%";

        return;
      }

      const level =
        Math.round(
          (participant.audioLevel || 0)
          * 100
        );

      const isSpeaking =
        participant.isSpeaking === true;

      data.box.classList.toggle(
        "speaking",
        isSpeaking
      );

      data.meterFill.style.width =
        isSpeaking
          ? level + "%"
          : "0%";
    }
  );
}

/*
Запускает обновление индикаторов каждые 120 мс.
Перед запуском старый таймер останавливается.
*/

function startAudioMeterTimer() {

  stopAudioMeterTimer();

  audioMeterTimer =
    setInterval(
      updateAudioIndicators,
      120
    );
}

/*
Останавливает таймер обновления индикаторов.
*/

function stopAudioMeterTimer() {

  if (audioMeterTimer) {

    clearInterval(
      audioMeterTimer
    );

    audioMeterTimer =
      null;
  }
}

/*
========================================
СПИСОК УЧАСТНИКОВ
========================================
*/

/*
Полностью перерисовывает список участников:

1. добавляет локального пользователя;
2. добавляет всех удалённых участников.
*/

function updateParticipants() {

  participantsBox.innerHTML =
    "";

  if (!room)
    return;

  addParticipantItem(
    room.localParticipant.identity,
    true
  );

  room.remoteParticipants.forEach(
    participant => {

      addParticipantItem(
        participant.identity,
        false
      );
    }
  );
}

/*
Добавляет одного участника в панель чата.

own = true:
это локальный пользователь, к имени добавляется "(you)".
*/

function addParticipantItem(
  participantName,
  own
) {

  const item =
    document.createElement("div");

  item.className =
    own
      ? "participant own"
      : "participant";

  item.textContent =
    own
      ? participantName + " (" + t("you") + ")"
      : participantName;

  participantsBox.appendChild(
    item
  );
}

/*
========================================
ТЕКСТОВЫЙ ЧАТ
========================================

Сообщения передаются через LiveKit DataChannel.
Отдельный сервер чата в этой версии не используется.
*/

/*
Добавляет одно сообщение в историю.

message содержит:
{
  sender,
  text,
  timestamp
}

own показывает, является ли сообщение собственным.
*/

function addMessage(
  message,
  own
) {

  const empty =
    document.getElementById(
      "emptyMessage"
    );

  if (empty) {
    empty.remove();
  }

  const box =
    document.createElement("div");

  box.className =
    own
      ? "message own"
      : "message";

  const head =
    document.createElement("div");

  head.className =
    "message-head";

  const name =
    document.createElement("span");

  name.className =
    "message-name";

  name.textContent =
    own
      ? message.sender + " (" + t("you") + ")"
      : message.sender;

  const time =
    document.createElement("span");

  time.className =
    "message-time";

  time.textContent =
    new Date(
      message.timestamp
    ).toLocaleTimeString(
      currentLanguage === "ru"
        ? "ru-RU"
        : "en-US",
      {
        hour: "2-digit",
        minute: "2-digit"
      }
    );

  const text =
    document.createElement("div");

  text.className =
    "message-text";

  /*
  Используется textContent, а не innerHTML.
  Это защищает от вставки HTML и скриптов.
  */

  text.textContent =
    message.text;

  head.appendChild(
    name
  );

  head.appendChild(
    time
  );

  box.appendChild(
    head
  );

  box.appendChild(
    text
  );

  messagesBox.appendChild(
    box
  );

  messagesBox.scrollTop =
    messagesBox.scrollHeight;
}

/*
Отправляет сообщение всем участникам комнаты.
*/

async function sendMessage() {

  if (
    !room ||
    !messagesCheck.checked
  ) {
    return;
  }

  const text =
    messageInput.value.trim();

  if (!text)
    return;

  const message = {
    type: "chat-message",
    sender: identity,
    text: text,
    timestamp: Date.now()
  };

  /*
  DataChannel передаёт Uint8Array,
  поэтому объект сначала превращается в JSON,
  затем кодируется в байты.
  */

  const bytes =
    new TextEncoder().encode(
      JSON.stringify(message)
    );

  await room.localParticipant
    .publishData(
      bytes,
      {
        reliable: true,
        topic: CHAT_TOPIC
      }
    );

  /*
  LiveKit не возвращает собственное сообщение
  отправителю, поэтому добавляем его локально.
  */

  addMessage(
    message,
    true
  );

  messageInput.value =
    "";

  messageInput.focus();
}

/*
Обрабатывает сообщение DataChannel,
пришедшее от другого участника.
*/

function handleDataReceived(
  payload,
  participant,
  kind,
  topic
) {

  /*
  Игнорируем сообщения с другой темой.
  */

  if (
    topic &&
    topic !== CHAT_TOPIC
  ) {
    return;
  }

  try {

    const json =
      new TextDecoder().decode(
        payload
      );

    const data =
      JSON.parse(json);

    if (
      data.type !==
      "chat-message"
    ) {
      return;
    }

    addMessage(
      {
        sender:
          data.sender ||
          participant?.identity ||
          t("unknown"),

        text:
          String(
            data.text || ""
          ),

        timestamp:
          Number(
            data.timestamp
          ) || Date.now()
      },
      false
    );

  } catch (error) {

    console.warn(
      "Invalid chat message:",
      error
    );
  }
}

/*
========================================
ВКЛЮЧЕНИЕ И ВЫКЛЮЧЕНИЕ КАМЕРЫ
========================================
*/

async function applyVideoState() {

  /*
  До подключения галочка только сохраняет выбор.
  Реальное включение камеры произойдёт после Join.
  */

  if (!room)
    return;

  try {

    await room.localParticipant
      .setCameraEnabled(
        videoCheck.checked
      );

    /*
    Камера включается только тогда,
    когда установлена галочка Video.
    */

    if (
      videoCheck.checked
    ) {

      room.localParticipant
        .videoTrackPublications
        .forEach(publication => {

          if (
            publication.track
          ) {
            addTrack(
              publication.track,
              identity
            );
          }
        });

    } else {

      removeParticipantVideo(
        identity
      );
    }

  } catch (error) {

    console.error(error);

    statusBox.textContent =
      t("videoError") + ": "
      + error.message;

    videoCheck.checked =
      !videoCheck.checked;
  }
}

/*
========================================
ВКЛЮЧЕНИЕ И ВЫКЛЮЧЕНИЕ МИКРОФОНА
========================================
*/

async function applyAudioState() {

  /*
  До подключения галочка только сохраняет выбор.
  */

  if (!room)
    return;

  try {

    await room.localParticipant
      .setMicrophoneEnabled(
        audioCheck.checked
      );

  } catch (error) {

    console.error(error);

    statusBox.textContent =
      t("audioError") + ": "
      + error.message;

    audioCheck.checked =
      !audioCheck.checked;
  }
}

/*
========================================
ПОКАЗ И СКРЫТИЕ ЧАТА
========================================
*/

/*
Если Messages выключен:

- панель чата скрывается;
- поле ввода блокируется;
- кнопка Send блокируется.
*/

function applyMessagesState() {

  const enabled =
    messagesCheck.checked;

  chatPanel.classList.toggle(
    "hidden",
    !enabled
  );

  messageInput.disabled =
    !enabled ||
    !isConnected;

  sendBtn.disabled =
    !enabled ||
    !isConnected;
}

/*
========================================
ПОДКЛЮЧЕНИЕ К LIVEKIT-КОМНАТЕ
========================================
*/

async function joinRoom() {

  identity = nameInput.value.trim();

  if (!identity) {
    joinNote.textContent = t("enterName");
    nameInput.focus();
    return;
  }

  /*
  Защита от повторного Join,
  если объект комнаты уже существует.
  */

  if (room)
    return;

  await applyRoomName(roomInput.value);

  if (!roomName) {
    statusBox.textContent = t("enterRoom");
    roomInput.focus();
    return;
  }

  try {

    joinBtn.disabled =
      true;

    statusBox.textContent =
      t("gettingToken");

    const token =
      await getLiveKitToken();

    /*
    Создаём локальный объект комнаты
    и ниже подписываемся на её события.
    */

    room =
      new Room();

    /*
    TrackSubscribed вызывается,
    когда браузер получил удалённый трек.
    */

    room.on(
      RoomEvent.TrackSubscribed,
      (
        track,
        publication,
        participant
      ) => {

        /*
        Удалённое видео добавляем в видеосетку.
        */

        if (
          track.kind === "video"
        ) {
          addTrack(
            track,
            participant.identity
          );
        }

        /*
        Для удалённого аудио обязательно
        прикрепляем track к audio-элементу.
        */

        /*
        Для удалённого аудио создаём скрытый
        HTML-элемент <audio>. Без attach()
        звук другого участника не будет слышен.
        */

        if (
          track.kind === "audio"
        ) {

          const audioElement =
            track.attach();

          audioElement.style.display =
            "none";

          document.body.appendChild(
            audioElement
          );
        }
      }
    );

    /*
    TrackUnsubscribed вызывается,
    когда удалённый участник выключил трек
    или браузер перестал его получать.
    */

    room.on(
      RoomEvent.TrackUnsubscribed,
      (
        track,
        publication,
        participant
      ) => {

        if (
          track.kind === "video"
        ) {

          removeParticipantVideo(
            participant.identity
          );
        }

        try {
          track.detach().forEach(
            element => element.remove()
          );
        } catch (error) {
          console.warn(error);
        }
      }
    );

    /*
    LiveKit сообщает об изменении списка говорящих.
    */

    room.on(
      RoomEvent.ActiveSpeakersChanged,
      updateAudioIndicators
    );

    /*
    Получение сообщений чата.
    */

    room.on(
      RoomEvent.DataReceived,
      handleDataReceived
    );

    /*
    Новый участник вошёл в комнату.
    */

    room.on(
      RoomEvent.ParticipantConnected,
      participant => {
        updateParticipants();
        addEvent("joined", participant.identity + " " + t("userJoined"));
      }
    );

    /*
    Участник вышел: удаляем его видео
    и обновляем список участников.
    */

    room.on(
      RoomEvent.ParticipantDisconnected,
      participant => {

        removeParticipantVideo(
          participant.identity
        );

        updateParticipants();
        addEvent("left", participant.identity + " " + t("userLeft"));
      }
    );

    /*
    Соединение с комнатой завершилось.
    */

    room.on(
      RoomEvent.Disconnected,
      resetDisconnectedState
    );

    statusBox.textContent =
      t("connecting");

    /*
    Фактическое подключение к LiveKit Cloud.
    */

    await room.connect(
      LIVEKIT_URL,
      token
    );

    isConnected =
      true;

    roomInput.disabled = true;
    createRoomBtn.disabled = true;
    nameInput.disabled = true;

    if (
      videoCheck.checked
    ) {

      try {

        await room.localParticipant
          .setCameraEnabled(true);

      } catch (error) {

        console.warn(
          "Camera error:",
          error
        );

        videoCheck.checked =
          false;
      }
    }

    /*
    Микрофон включается только тогда,
    когда установлена галочка Audio.
    */

    if (
      audioCheck.checked
    ) {

      try {

        await room.localParticipant
          .setMicrophoneEnabled(
            true
          );

      } catch (error) {

        console.warn(
          "Microphone error:",
          error
        );

        audioCheck.checked =
          false;
      }
    }

    /*
    После включения камеры добавляем
    собственный локальный видеотрек на страницу.
    */

    room.localParticipant
      .videoTrackPublications
      .forEach(publication => {

        if (
          publication.track
        ) {

          addTrack(
            publication.track,
            identity
          );
        }
      });

    updateParticipants();

    startAudioMeterTimer();

    applyMessagesState();

    statusBox.textContent =
      t("connected")
      + ": "
      + roomName
      + " | "
      + identity;

    leaveBtn.disabled =
      false;

    joinNote.textContent = t("connected");
    addEvent("joined", identity + " " + t("userJoined"));

  } catch (error) {

    console.error(error);

    statusBox.textContent =
      t("connectionError")
      + ": "
      + error.message;

    if (room) {
      room.disconnect();
      room = null;
    }

    isConnected =
      false;

    joinBtn.disabled =
      false;

    leaveBtn.disabled =
      true;

    applyMessagesState();
  }
}

/*
========================================
ВЫХОД ИЗ КОМНАТЫ
========================================
*/

/*
Запускает отключение от LiveKit.
После room.disconnect() также сработает
событие RoomEvent.Disconnected.
*/

function leaveRoom() {

  if (room) {
    room.disconnect();
  }

  resetDisconnectedState();
}

/*
Возвращает страницу в исходное состояние:

- останавливает таймеры;
- останавливает локальные треки;
- очищает видеокарточки;
- очищает список участников;
- блокирует чат;
- снова включает Join.
*/

function resetDisconnectedState() {

  stopAudioMeterTimer();

  isConnected =
    false;

  roomInput.disabled = false;
  createRoomBtn.disabled = false;
  nameInput.disabled = false;

  if (room) {

    room.localParticipant
      .trackPublications
      .forEach(publication => {

        if (
          publication.track
        ) {

          try {
            publication.track
              .stop();
          } catch (error) {
            console.warn(error);
          }
        }
      });
  }

  room =
    null;

  participantBoxes.forEach(
    data => {

      try {
        data.track.detach();
      } catch (error) {
        console.warn(error);
      }

      data.box.remove();
    }
  );

  participantBoxes.clear();

  participantsBox.innerHTML =
    "";

  showPlaceholder(
    t("joinRoom")
  );

  joinBtn.disabled =
    false;

  leaveBtn.disabled =
    true;

  statusBox.textContent =
    t("disconnected");

  applyMessagesState();
}

/*
========================================
ОБРАБОТЧИКИ ЭЛЕМЕНТОВ ИНТЕРФЕЙСА
========================================
*/

joinBtn.addEventListener(
  "click",
  requestAccess
);

leaveBtn.addEventListener(
  "click",
  leaveRoom
);

approveBtn.addEventListener(
  "click",
  () => answerJoinRequest(true)
);

rejectBtn.addEventListener(
  "click",
  () => answerJoinRequest(false)
);

clearEventsBtn.addEventListener(
  "click",
  () => eventList.innerHTML = ""
);

nameInput.addEventListener(
  "keydown",
  event => {
    if (event.key === "Enter") {
      event.preventDefault();
      requestAccess();
    }
  }
);


videoCheck.addEventListener(
  "change",
  applyVideoState
);

audioCheck.addEventListener(
  "change",
  applyAudioState
);

messagesCheck.addEventListener(
  "change",
  applyMessagesState
);

sendBtn.addEventListener(
  "click",
  sendMessage
);

/*
Enter отправляет сообщение.
Shift + Enter вставляет новую строку.
*/

messageInput.addEventListener(
  "keydown",
  event => {

    if (
      event.key === "Enter" &&
      !event.shiftKey
    ) {

      event.preventDefault();

      sendMessage();
    }
  }
);

/*
Переключение языка без перезагрузки страницы.
*/

ruBtn.addEventListener(
  "click",
  () => setLanguage("ru")
);

enBtn.addEventListener(
  "click",
  () => setLanguage("en")
);

createRoomBtn.addEventListener(
  "click",
  createRoomName
);

roomInput.addEventListener(
  "change",
  handleRoomInputChange
);

roomInput.addEventListener(
  "keydown",
  event => {
    if (event.key === "Enter") {
      event.preventDefault();
      handleRoomInputChange();
      joinRoom();
    }
  }
);

copyLinkBtn.addEventListener(
  "click",
  copyInviteLink
);

/*
Применяем начальное состояние Messages
и выбранный язык сразу после загрузки модуля.
*/

nameInput.value = localStorage.getItem("vpnRoomUserName") || "";
applyMessagesState();
await initializeRoomName();
applyLanguage();

</script>

<!--
Сервисная консоль
-->

<div id="service-console">
  realtime approval | v1.4.0
</div>

<div class="row" id="build-down">
  deploy: --
</div>

<script>

/*
слева добавлена консоль событий;
по центру остались видеополя;
запрос на вход появляется поверх видео у создателя;
поле имени и кнопка Подключиться находятся снизу по центру;
Создать комнату находится сверху по центру;
одобрение работает через Supabase Realtime Broadcast;
никаких таблиц и никакого SQL не требуется;
если создателя нет на странице, через 15 секунд выводится, что он не отвечает.
*/

(function () {

  const now =
    new Date();

  const pad = number =>
    String(number).padStart(
      2,
      "0"
    );

  const date =
      pad(now.getDate())
    + "."
    + pad(
        now.getMonth() + 1
      )
    + "."
    + now.getFullYear();

  const time =
      pad(now.getHours())
    + ":"
    + pad(now.getMinutes());

  document
    .getElementById(
      "build-down"
    )
    .textContent =
      "deploy: "
      + date
      + " "
      + time;
})();
</script>
